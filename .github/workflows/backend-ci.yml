name: Backend CI

on:
  push:
    paths:
      - "ImpiTrack/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "ImpiTrack/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  build_test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ImpiTrack/ImpiTrack.sln

      - name: Build
        run: dotnet build ImpiTrack/ImpiTrack.sln -c Debug --no-restore

      - name: Test
        run: dotnet test ImpiTrack/ImpiTrack.sln -c Debug --no-build
