services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ImpiTrackDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:8080"
      - "5001:5001"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=ImpiTrackDB;Username=postgres;Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__IdentityPostgres: "Host=postgres;Port=5432;Database=ImpiTrackDB;Username=postgres;Password=${POSTGRES_PASSWORD}"
      Database__Provider: Postgres
      Database__EnableAutoMigrate: "true"
      Database__CommandTimeoutSeconds: "30"
      IdentityStorage__Provider: Postgres
      IdentityBootstrap__SeedAdminOnStart: "true"
      IdentityBootstrap__AdminPassword: "${ADMIN_PASSWORD}"
      Jwt__SigningKey: "${JWT_SIGNING_KEY}"
      Jwt__Issuer: ImpiTrack
      Jwt__Audience: ImpiTrack.Api
      Email__Enabled: "true"
      Email__FromName: ImpiTrack
      Email__FromEmail: "${SMTP_USER}"
      Email__VerifyEmailBaseUrl: "https://api.impitrack.com/api/auth/verify-email/confirm"
      Email__ResetPasswordBaseUrl: "https://impitrack.com/auth/reset-password"
      Email__Smtp__Host: smtp.gmail.com
      Email__Smtp__Port: "587"
      Email__Smtp__UseSsl: "true"
      Email__Smtp__UserName: "${SMTP_USER}"
      Email__Smtp__Password: "${SMTP_PASSWORD}"
      Cors__AllowedOrigins__0: "${CORS_ORIGIN:-http://localhost:4200}"
    depends_on:
      - postgres
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
